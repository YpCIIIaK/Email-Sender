{% extends "base.html" %}
{% block content %}
<h1>Sending Progress</h1>

<div id="stats">
    <p>Total: <span id="total">0</span> | Sent: <span id="successful" style="color:green;">0</span> | Failed: <span id="failed" style="color:red;">0</span></p>
    <p id="status">Sending...</p>
</div>

<table id="log-table">
    <thead>
        <tr>
            <th>#</th>
            <th>Email</th>
            <th>Status</th>
            <th>Time</th>
            <th>Error</th>
        </tr>
    </thead>
    <tbody id="log-body">
    </tbody>
</table>

<script type="text/javascript">
var campaignId = {{ campaign_id }};
var intervalId = null;

function updateProgress() {
    fetch("/api/progress/" + campaignId)
        .then(function(r) { 
            if (!r.ok) {
                throw new Error('Network response was not ok');
            }
            return r.json(); 
        })
        .then(function(data) {
            document.getElementById("total").textContent = data.total;
            document.getElementById("successful").textContent = data.successful;
            document.getElementById("failed").textContent = data.failed;
            
            var tbody = document.getElementById("log-body");
            tbody.innerHTML = "";
            for (var i = 0; i < data.logs.length; i++) {
                var log = data.logs[i];
                var tr = document.createElement("tr");
                var td1 = document.createElement("td");
                td1.textContent = i + 1;
                var td2 = document.createElement("td");
                td2.textContent = log.email;
                var td3 = document.createElement("td");
                td3.textContent = log.status;
                td3.style.color = log.status === "sent" ? "green" : "red";
                var td4 = document.createElement("td");
                td4.textContent = log.sent_at;
                var td5 = document.createElement("td");
                td5.textContent = log.error || "";
                tr.appendChild(td1);
                tr.appendChild(td2);
                tr.appendChild(td3);
                tr.appendChild(td4);
                tr.appendChild(td5);
                tbody.appendChild(tr);
            }
            
            if (data.is_done) {
                document.getElementById("status").textContent = "Done!";
                document.getElementById("status").style.color = "green";
                if (intervalId) {
                    clearInterval(intervalId);
                }
            } else {
                document.getElementById("status").textContent = "Sending...";
            }
        })
        .catch(function(error) {
            console.error('Error fetching progress:', error);
            document.getElementById("status").textContent = "Error loading progress...";
        });
}

updateProgress();
intervalId = setInterval(updateProgress, 2000);
</script>
{% endblock %}
